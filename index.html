<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alia School</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

.day {
  margin-bottom: 20px;
}

button {
  display: block;
  width: 90%;
  margin: 8px auto;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.english { background: #fff2a8; }
.arabic { background: #d8f0ff; }
.maths { background: #e0ccff; }
.science { background: #ffd8d8; }
.quran { background: #e6fbe6; }
.islamic { background: #bdf0c2; }
.art { background: #ffd6f0; }
.club { background: #ffe0b3; }

.done {
  opacity: 0.5;
  text-decoration: line-through;
}

</style>
</head>

<body>

<h1>Alia School</h1>

<div class="day">

<button class="english" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P1 English</button>

<button class="english" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P2 English</button>

<button class="science" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P3 Science</button>

<button class="maths" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P4 Maths</button>

<button class="arabic" onclick="openClass(this,'https://meet.google.com/kgz-nhsi-mac')">P5 Arabic Reading</button>

<button class="english" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P6 English</button>

<button class="art" onclick="openClass(this,'https://meet.google.com/mxu-jhxz-yds?authuser=0')">P7 Art</button>

<button class="quran" onclick="openClass(this,'https://meet.google.com/cse-huzv-qrb')">P8 Quran</button>

</div>

<script>
function openClass(btn, url) {
  btn.classList.add("done");
  window.open(url, "_blank");
}
</script>

</body>
</html>
