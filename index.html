<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alia School</title>
<style>
:root {
  --bg1:#f8fbff;
  --bg2:#eef4ff;
  --text:#243047;
  --muted:#6b7280;
  --card:#ffffff;
  --border:#e6eaf2;
  --nav:#243047;
  --navActive:#4f7cff;
  --english:#fff2a8;
  --arabic:#d8f0ff;
  --maths:#ecd9ff;
  --science:#ffd8d8;
  --pe:#ffffff;
  --quran:#e6fbe6;
  --islamic:#bdf0c2;
  --computer:#d6fff3;
  --art:#ffd6f0;
  --club:#ffe0b3;
  --done:#e5e7eb;
  --current:#6ea0ff;
  --shadow:0 12px 28px rgba(53,73,109,0.10);
  --radius:22px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  min-height:100vh;
  padding:18px;
}
.app{max-width:820px;margin:0 auto}
.header{
  background:rgba(255,255,255,0.95);
  border:1px solid var(--border);
  border-radius:28px;
  padding:18px 18px 16px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.topline{display:flex;align-items:center;justify-content:space-between;gap:12px}
.badge{
  background:#f3f6fb;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
}
.title{font-size:32px;font-weight:800;margin:10px 0 4px}
.date{color:var(--muted);font-size:16px;margin-bottom:14px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px}
.progress-label,.progress-text{font-size:14px;font-weight:700}
.progress-text{color:var(--muted)}
.progress{height:12px;background:#e7edf7;border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#7db0ff,#8f7dff);transition:width .25s ease}
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.nav button{
  border:none;border-radius:16px;padding:13px 10px;background:var(--nav);color:#fff;
  font-size:15px;font-weight:800;letter-spacing:.2px;cursor:pointer;
}
.nav button.active{background:var(--navActive);box-shadow:0 6px 14px rgba(79,124,255,.28)}
.helper{font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 4px}
.day{display:none}
.day.active{display:block}
.card{
  background:var(--card);
  border:1px solid rgba(36,48,71,0.06);
  border-radius:var(--radius);
  padding:16px;
  margin:0 0 12px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  box-shadow:var(--shadow);
  transition:.2s ease;
}
.card.current{outline:4px solid var(--current);transform:translateY(-1px)}
.card.done{background:var(--done)!important;opacity:.72;border-style:dashed}
.subject-arabic{background:var(--arabic)}
.subject-english{background:var(--english)}
.subject-maths{background:var(--maths)}
.subject-science{background:var(--science)}
.subject-pe{background:var(--pe)}
.subject-quran{background:var(--quran)}
.subject-islamic{background:var(--islamic)}
.subject-computer{background:var(--computer)}
.subject-art{background:var(--art)}
.subject-club{background:var(--club)}
.time{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:8px}
.main-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.period{
  background:rgba(255,255,255,0.75);
  border:1px solid rgba(0,0,0,.08);
  border-radius:999px;
  padding:4px 10px;
  font-size:13px;
  font-weight:800;
}
.subject{font-size:24px;font-weight:800}
.status{font-size:13px;color:var(--muted);font-weight:700}
.action{
  min-width:138px;
  text-align:center;
  padding:14px 16px;
  border-radius:16px;
  background:#243047;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  font-size:18px;
  box-shadow:0 8px 18px rgba(36,48,71,.18);
}
.card.current .action{background:#295fd6}
.card.done .action{background:#9ca3af;box-shadow:none}
.footer-note{color:var(--muted);font-size:12px;text-align:center;margin-top:8px}
@media (max-width:640px){
  body{padding:12px}
  .title{font-size:28px}
  .nav{grid-template-columns:repeat(2,1fr)}
  .card{grid-template-columns:1fr}
  .action{width:100%}
  .subject{font-size:22px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="topline">
      <div class="badge">Alia School</div>
      <div class="badge" id="liveBadge">Today</div>
    </div>
    <div class="title" id="dayTitle"></div>
    <div class="date" id="date"></div>

    <div class="progress-row">
      <div class="progress-label">Today Progress</div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>
  </div>

  <div class="nav" id="nav">
    <button data-day="monday" onclick="showDay('monday')">Mon</button>
    <button data-day="tuesday" onclick="showDay('tuesday')">Tue</button>
    <button data-day="wednesday" onclick="showDay('wednesday')">Wed</button>
    <button data-day="thursday" onclick="showDay('thursday')">Thu</button>
  </div>

  <div class="helper">Only the current class can be opened.</div>

  <div id="monday" class="day"></div>
  <div id="tuesday" class="day"></div>
  <div id="wednesday" class="day"></div>
  <div id="thursday" class="day"></div>

  <div class="footer-note">Guided Access recommended during class time.</div>
</div>

<script>
const subjectLinks = {
  'P.E':'https://meet.google.com/cee-vbnx-iji',
  'Arabic':'https://meet.google.com/cse-huzv-qrb',
  'Arabic Reading':'https://meet.google.com/kgz-nhsi-mac',
  'English':'https://meet.google.com/mxu-jhxz-yds?authuser=0',
  'Maths':'https://meet.google.com/mxu-jhxz-yds?authuser=0',
  'Science':'https://meet.google.com/mxu-jhxz-yds?authuser=0',
  'Computer':'https://meet.google.com/mxu-jhxz-yds?authuser=0',
  'Islamic':'https://meet.google.com/cse-huzv-qrb',
  'Quran':'https://meet.google.com/cse-huzv-qrb',
  'Art':'https://meet.google.com/mxu-jhxz-yds?authuser=0',
  'Club':'#'
};

const data = {
  monday:[
    ['08:00','08:30','P1','P.E','pe','⚽'],
    ['08:35','09:05','P2','Arabic','arabic','✏️'],
    ['09:10','09:40','P3','Arabic','arabic','✏️'],
    ['10:05','10:35','P4','English','english','🔤'],
    ['10:40','11:10','P5','English','english','🔤'],
    ['11:15','11:45','P6','Maths','maths','🧮'],
    ['12:00','12:30','P7','Maths','maths','🧮'],
    ['12:35','13:05','P8','Science','science','🧪']
  ],
  tuesday:[
    ['08:00','08:30','P1','English','english','🔤'],
    ['08:35','09:05','P2','English','english','🔤'],
    ['09:10','09:40','P3','Science','science','🧪'],
    ['10:05','10:35','P4','Maths','maths','🧮'],
    ['10:40','11:10','P5','Arabic Reading','arabic','📘'],
    ['11:15','11:45','P6','English','english','🔤'],
    ['12:00','12:30','P7','Art','art','🎨'],
    ['12:35','13:05','P8','Quran','quran','🌙']
  ],
  wednesday:[
    ['08:00','08:30','P1','P.E','pe','⚽'],
    ['08:35','09:05','P2','Maths','maths','🧮'],
    ['09:10','09:40','P3','English','english','🔤'],
    ['10:05','10:35','P4','English','english','🔤'],
    ['10:40','11:10','P5','Arabic','arabic','✏️'],
    ['11:15','11:45','P6','Computer','computer','💻'],
    ['12:00','12:30','P7','Islamic','islamic','🕌'],
    ['12:35','13:05','P8','Quran','quran','🌙']
  ],
  thursday:[
    ['08:35','09:05','P2','Maths','maths','🧮'],
    ['09:10','09:40','P3','Maths','maths','🧮'],
    ['10:05','10:35','P4','Arabic','arabic','✏️'],
    ['10:40','11:10','P5','Arabic','arabic','✏️'],
    ['11:15','11:45','P6','Science','science','🧪'],
    ['12:00','12:30','P7','English','english','🔤'],
    ['12:35','13:05','P8','English','english','🔤']
  ]
};

let activeDay = 'monday';
let lastAnnounced = null;

function toMinutes(t){
  const [a,b] = t.split(':').map(Number);
  return a*60 + b;
}

function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

function prettifyDay(day){
  return day.charAt(0).toUpperCase() + day.slice(1);
}

function render(){
  Object.keys(data).forEach(day => {
    const container = document.getElementById(day);
    container.innerHTML = '';

    data[day].forEach(item => {
      const [start,end,period,subject,color,icon] = item;
      const finalUrl = subjectLinks[subject] || '#';
      const key = `${day}-${period}`;
      const done = localStorage.getItem(key) === 'done';

      container.innerHTML += `
        <div class="card subject-${color} ${done ? 'done' : ''}" data-key="${key}" data-day="${day}" data-start="${start}" data-end="${end}" data-url="${finalUrl}">
          <div>
            <div class="time">${start} – ${end}</div>
            <div class="main-line">
              <span class="period">${period}</span>
              <span class="subject">${subject} ${icon}</span>
            </div>
            <div class="status">${done ? 'Finished' : 'Coming up'}</div>
          </div>
          <a class="action" href="${finalUrl}" target="_blank" rel="noopener">${done ? '✓ Done' : 'Join'}</a>
        </div>`;
    });
  });

  updateStates();
  updateProgress();
  updateNav();
}

function updateStates(){
  const now = nowMinutes();
  document.querySelectorAll('.card').forEach(card => {
    card.classList.remove('current');
    const statusEl = card.querySelector('.status');
    const start = toMinutes(card.dataset.start);
    const end = toMinutes(card.dataset.end);
    const done = localStorage.getItem(card.dataset.key) === 'done';

    if(done){
      card.classList.add('done');
      card.querySelector('.action').textContent = '✓ Done';
      statusEl.textContent = 'Finished';
      return;
    }

    card.classList.remove('done');
    card.querySelector('.action').textContent = 'Join';

    if(card.dataset.day === activeDay && now >= start && now <= end){
      card.classList.add('current');
      statusEl.textContent = 'Current class';
    } else if(card.dataset.day === activeDay && now < start){
      statusEl.textContent = 'Coming up';
    } else if(card.dataset.day === activeDay && now > end){
      statusEl.textContent = 'Missed or not opened';
    } else {
      statusEl.textContent = 'Coming up';
    }
  });
}

function updateProgress(){
  const cards = [...document.querySelectorAll(`#${activeDay} .card`)];
  const total = cards.length;
  const done = cards.filter(card => card.classList.contains('done')).length;
  const percent = total ? (done / total) * 100 : 0;
  document.getElementById('progress').style.width = `${percent}%`;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
}

function updateNav(){
  document.querySelectorAll('#nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.day === activeDay);
  });
}

function showDay(day){
  activeDay = day;
  document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
  document.getElementById(day).classList.add('active');
  document.getElementById('dayTitle').textContent = prettifyDay(day);
  updateStates();
  updateProgress();
  updateNav();
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.92;
  msg.pitch = 1.02;
  msg.volume = 1;
  speechSynthesis.speak(msg);
}

function announceNext(){
  const now = nowMinutes();
  document.querySelectorAll(`#${activeDay} .card`).forEach(card => {
    const start = toMinutes(card.dataset.start);
    const key = card.dataset.key;
    if(localStorage.getItem(key) === 'done') return;
    if(start > now && start - now <= 1 && lastAnnounced !== key){
      lastAnnounced = key;
      speak('Alia, next class');
    }
  });
}

function showStars(){
  const cards = [...document.querySelectorAll(`#${activeDay} .card`)];
  const total = cards.length;
  const done = cards.filter(card => card.classList.contains('done')).length;
  if(total && done === total){
    setTimeout(() => alert('⭐ Great job Alia! ⭐'), 120);
  }
}

document.addEventListener('click', e => {
  const action = e.target.closest('.action');
  if(!action) return;

  const card = action.closest('.card');
  const url = card.dataset.url;

  if(url === '#'){
    e.preventDefault();
    speak('No link for this class');
    return;
  }

  if(!card.classList.contains('current')){
    e.preventDefault();
    speak('Not now');
    return;
  }

  localStorage.setItem(card.dataset.key, 'done');
  card.classList.add('done');
  card.querySelector('.action').textContent = '✓ Done';
  card.querySelector('.status').textContent = 'Finished';
  updateProgress();
  showStars();
});

function setToday(){
  const today = new Date();
  document.getElementById('date').textContent = today.toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric', year:'numeric'
  });

  const weekMap = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const actual = weekMap[today.getDay()];
  const allowed = ['monday','tuesday','wednesday','thursday'];
  showDay(allowed.includes(actual) ? actual : 'monday');
}

render();
setToday();
setInterval(updateStates, 30000);
setInterval(announceNext, 60000);
</script>
</body>
</html>
