<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Alia School App</title>
<style>
:root {
  --bg1:#f8fbff;
  --bg2:#eef4ff;
  --text:#243047;
  --muted:#6b7280;
  --card:#ffffff;
  --border:#e6eaf2;
  --nav:#243047;
  --navActive:#4f7cff;
  --english:#fff2a8;
  --arabic:#d8f0ff;
  --maths:#ecd9ff;
  --science:#ffd8d8;
  --pe:#ffffff;
  --quran:#e6fbe6;
  --islamic:#bdf0c2;
  --computer:#d6fff3;
  --art:#ffd6f0;
  --club:#ffe0b3;
  --done:#e5e7eb;
  --current:#6ea0ff;
  --shadow:0 12px 28px rgba(53,73,109,0.10);
  --radius:22px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  min-height:100vh;
  padding:18px;
}
.app{
  max-width:820px;
  margin:0 auto;
}
.header{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(8px);
  border:1px solid var(--border);
  border-radius:28px;
  padding:18px 18px 16px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.badge{
  background:#f3f6fb;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 12px;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
}
.title{
  font-size:32px;
  font-weight:800;
  margin:10px 0 4px;
}
.date{
  color:var(--muted);
  font-size:16px;
  margin-bottom:14px;
}
.progress-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  gap:10px;
}
.progress-label{
  font-size:14px;
  font-weight:700;
}
.progress-text{
  font-size:14px;
  color:var(--muted);
  font-weight:700;
}
.progress{
